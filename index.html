<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Formula Arch - Placar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <main class="track-container">
        <svg
          id="raceTrack"
          viewBox="0 0 800 400"
          preserveAspectRatio="xMidYMid meet"
        >
          <defs>
            <path
              id="trackPath"
              d="M 150 50
                 H 650
                 Q 750 50 750 150
                 V 250
                 Q 750 350 650 350
                 H 150
                 Q 50 350 50 250
                 V 150
                 Q 50 50 150 50 Z"
            />
            <pattern
              id="finishPattern"
              width="8"
              height="8"
              patternUnits="userSpaceOnUse"
            >
              <rect width="8" height="8" fill="#f8fafc" />
              <rect x="0" y="0" width="4" height="4" fill="#0f172a" />
              <rect x="4" y="4" width="4" height="4" fill="#0f172a" />
            </pattern>
          </defs>

          <use href="#trackPath" class="track-outline" />
          <rect x="391" y="342" width="18" height="16" fill="url(#finishPattern)" />

          <g id="racersLayer"></g>
        </svg>
      </main>

      <aside class="sidebar">
        <h1>Posições</h1>
        <p class="sidebar-subtitle">
          Acompanhe as posições das equipes no campeonato.
        </p>
        <div class="lap-row">
          <span class="lap-label">Volta</span>
          <span class="lap-counter" id="lapCounter">0/62</span>
          <span class="lap-message" id="lapMessage"
            >não acredito que você esperou a corrida acabar</span
          >
        </div>

        <div id="leaderCard" class="leader-card">
          <div class="leader-label" id="leaderLabel">Líder Atual</div>
          <div class="leader-entries">
            <div class="leader-top-row" id="leaderEntry1">
              <div class="leader-name" id="leaderName1">–</div>
              <div class="leader-logo-slot">
                <img id="leaderLogo1" alt="Logo da equipe líder" />
              </div>
            </div>
            <div class="leader-top-row" id="leaderEntry2">
              <div class="leader-name" id="leaderName2">–</div>
              <div class="leader-logo-slot">
                <img id="leaderLogo2" alt="Logo da equipe líder" />
              </div>
            </div>
          </div>
          <div class="leader-points" id="leaderPoints">– pontos</div>
        </div>

        <h2>Todas as equipes</h2>
        <ul id="standingsList" class="standings-list"></ul>

        <div class="footer">
          <div class="hint">Atualização automática da classificação.</div>
        </div>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
  </html>
